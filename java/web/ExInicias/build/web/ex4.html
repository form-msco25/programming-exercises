<html>
    <head>
        <title>Método POST -MO</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div>Demonstração de um POST</div>
        <!-- Definir action (página para onde se enviam os dados)-->
        <!-- Method (POST - mostra os dados; GET - mostra os dados na barra
        de endereço do browser)-->
        <form action="ex4.jsp" method="post">
            Primeiro nome: <input type="text" name="nome" maxlength="20"><br>
            Último nome: <input type="text" name="uNome" maxlength="20"><br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">            
        </form>
    </body>
</html>
